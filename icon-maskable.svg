<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Android Adaptive Icon の maskable PNG を生成する元 SVG。
       generate-icons.cjs が読み込んで sharp で 192x192 / 512x512 PNG に変換する。
       favicon.svg と同じデザインだが、 maskable 用途では「中央 80% (= 約 205px)」 が
       安全領域、 「外側 10% ずつ (= 約 26px)」 がマスクで切られる可能性がある領域。
       本デザインは要素を中央 168x110 に収め、 矩形中心が viewBox 中心 (128) に来るよう
       y=73 を採用しているので safe zone 内に収まる。 -->
  <rect width="256" height="256" fill="#ffffff"/>
  <rect x="44" y="73" width="168" height="110" rx="18" ry="18"
        fill="#d4d4d4" stroke="#000000" stroke-width="8"/>
  <circle cx="110" cy="128" r="32"
          fill="#525252" stroke="#000000" stroke-width="8"/>
  <circle cx="186" cy="95" r="11" fill="#dc2626"/>
</svg>
