<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- TeslaCamV favicon (= 採用案 A-other-9 / 青→紫グラデ、 大きめ + 背景透過版)。
       要件: 角丸の少し横長の長方形 (青→紫グラデ塗り) +
             少し左寄りのレンズ円 (白塗り) + 右上の赤い塗りつぶしの小さい丸 (録画ランプ)。
       Android Adaptive Icon の maskable とは別ファイルにしているので safe zone 制約は
       なく、 viewBox 256 に対し矩形 216x140 (= 横 84% / 縦 55%) まで拡大している。
       矩形中心は viewBox 中心 (128, 128) と一致 (= y=58〜198)。
       カメラ外側 (= 矩形の外) は背景塗りなしで透過し、 ブラウザタブ / OS のテーマ色に馴染ませる。
       シンプル路線として線は使わず、 塗り面のみで形を構成する。
       maskable 用は icon-maskable.svg (= 背景白 + 中央 168x110) を別途保持する。 -->
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect x="20" y="58" width="216" height="140" rx="23" ry="23" fill="url(#logoGrad)"/>
  <circle cx="105" cy="128" r="41" fill="#ffffff"/>
  <circle cx="203" cy="86" r="14" fill="#dc2626"/>
</svg>
