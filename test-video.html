<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動画再生テスト - 暗転確認用</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 { font-size: 18px; margin-bottom: 16px; }
    #drop-zone {
      width: 640px;
      max-width: 100%;
      aspect-ratio: 16/9;
      border: 2px dashed #555;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }
    #drop-zone.has-video { border: none; }
    #drop-zone.dragover { border-color: #4af; background: rgba(68,170,255,0.1); }
    #drop-text { color: #888; font-size: 14px; text-align: center; line-height: 1.6; }
    video {
      width: 100%;
      height: 100%;
      display: none;
      border-radius: 8px;
      background: #000;
    }
    #controls {
      margin-top: 16px;
      display: none;
      gap: 12px;
      align-items: center;
    }
    button {
      padding: 8px 24px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #4af;
      color: #fff;
    }
    button:hover { background: #5bf; }
    #status {
      font-size: 14px;
      color: #aaa;
    }
    #file-input { display: none; }
  </style>
</head>
<body>
  <h1>動画再生テスト (暗転確認用)</h1>
  <div id="drop-zone">
    <span id="drop-text">ここに動画ファイルをドロップ<br>またはクリックして選択</span>
    <video id="video"></video>
  </div>
  <div id="controls">
    <button id="btn-play">再生</button>
    <button id="btn-pause">一時停止</button>
    <span id="status">停止中</span>
  </div>
  <input type="file" id="file-input" accept="video/*">

  <script>
    const video = document.getElementById('video');
    const dropZone = document.getElementById('drop-zone');
    const dropText = document.getElementById('drop-text');
    const controls = document.getElementById('controls');
    const btnPlay = document.getElementById('btn-play');
    const btnPause = document.getElementById('btn-pause');
    const status = document.getElementById('status');
    const fileInput = document.getElementById('file-input');

    // ファイル読み込み
    function loadFile(file) {
      const url = URL.createObjectURL(file);
      video.src = url;
      video.style.display = 'block';
      dropText.style.display = 'none';
      dropZone.classList.add('has-video');
      controls.style.display = 'flex';
      status.textContent = '読み込み済み: ' + file.name;
    }

    // ドロップ
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) loadFile(e.dataTransfer.files[0]);
    });

    // クリックで選択
    dropZone.addEventListener('click', () => {
      if (!video.src) fileInput.click();
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) loadFile(fileInput.files[0]);
    });

    // 再生・一時停止
    btnPlay.addEventListener('click', () => {
      video.play();
    });
    btnPause.addEventListener('click', () => {
      video.pause();
    });

    video.addEventListener('play', () => { status.textContent = '再生中'; });
    video.addEventListener('pause', () => { status.textContent = '一時停止'; });
    video.addEventListener('ended', () => { status.textContent = '再生完了'; });
  </script>
</body>
</html>
