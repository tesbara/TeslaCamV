<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/TeslaCamV/favicon.svg" />
    <link rel="manifest" href="/TeslaCamV/manifest.json" />
    <link rel="apple-touch-icon" href="/TeslaCamV/favicon.svg" />
    <meta name="theme-color" content="#080d18" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeslaCamV</title>
    <!-- 一時的な調査用 (スマホで真っ白問題の切り分け、確認後削除する) -->
    <script>
      (function(){
        var box, content, btn;
        function attachIfReady(){
          if(box && !box.parentNode){
            if(document.body) document.body.appendChild(box);
            else document.addEventListener('DOMContentLoaded', function(){document.body.appendChild(box)});
          }
        }
        function ensure(color){
          if(!box){
            box=document.createElement('div');
            box.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;color:#fff;font:12px/1.4 monospace;padding:8px;max-height:50vh;overflow:auto;';
            btn=document.createElement('button');
            btn.textContent='📋 コピー';
            btn.style.cssText='float:right;padding:4px 10px;background:#fff;color:#000;border:none;border-radius:4px';
            btn.onclick=function(){
              navigator.clipboard.writeText(content.textContent)
                .then(function(){btn.textContent='✓ コピー済'});
            };
            content=document.createElement('pre');
            content.style.cssText='white-space:pre-wrap;margin:0;padding-top:6px';
            box.appendChild(btn);
            box.appendChild(content);
          }
          if(color) box.style.background=color;
          attachIfReady();
        }
        function show(msg, color){
          ensure(color||'#900');
          content.textContent += msg + '\n';
        }
        // 起動確認 (緑色)
        show('[startup] '+new Date().toLocaleTimeString(), '#060');
        // 3 秒後に root の状況をチェック
        setTimeout(function(){
          var root=document.getElementById('root');
          var cnt=root?root.children.length:-1;
          if(cnt<=0) show('[empty] root is empty after 3s (innerHTML.length='+(root?(root.innerHTML||'').length:'no-root')+')', '#960');
          else show('[ok] root has '+cnt+' children after 3s', '#060');
        }, 3000);
        window.addEventListener('error', function(e){
          show('[error] '+(e.error&&e.error.stack||e.message), '#900');
        });
        window.addEventListener('unhandledrejection', function(e){
          show('[promise] '+(e.reason&&e.reason.stack||e.reason), '#900');
        });
      })();
    </script>
    <script type="module" crossorigin src="/TeslaCamV/assets/index-BeF9Y1ST.js"></script>
    <link rel="stylesheet" crossorigin href="/TeslaCamV/assets/index-TKyN1Pdn.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
