<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/TeslaCamV/favicon.svg" />
    <link rel="manifest" href="/TeslaCamV/manifest.json" />
    <link rel="apple-touch-icon" href="/TeslaCamV/favicon.svg" />
    <meta name="theme-color" content="#080d18" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeslaCamV</title>
    <!-- 一時的なエラー表示 (スマホで真っ白問題の調査用、確認後削除する) -->
    <script>
      (function(){
        var box, content, btn;
        function ensure(){
          if(box) return;
          box=document.createElement('div');
          box.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:#900;color:#fff;font:12px/1.4 monospace;padding:8px;max-height:50vh;overflow:auto;';
          btn=document.createElement('button');
          btn.textContent='📋 コピー';
          btn.style.cssText='float:right;padding:4px 10px;background:#fff;color:#900;border:none;border-radius:4px';
          btn.onclick=function(){
            navigator.clipboard.writeText(content.textContent)
              .then(function(){btn.textContent='✓ コピー済'});
          };
          content=document.createElement('pre');
          content.style.cssText='white-space:pre-wrap;margin:0;padding-top:6px';
          box.appendChild(btn);
          box.appendChild(content);
          document.body.appendChild(box);
        }
        function show(msg){ ensure(); content.textContent += msg + '\n'; }
        window.addEventListener('error', function(e){
          show('[error] '+(e.error&&e.error.stack||e.message));
        });
        window.addEventListener('unhandledrejection', function(e){
          show('[promise] '+(e.reason&&e.reason.stack||e.reason));
        });
      })();
    </script>
    <script type="module" crossorigin src="/TeslaCamV/assets/index-Bk9NCd_0.js"></script>
    <link rel="stylesheet" crossorigin href="/TeslaCamV/assets/index-TKyN1Pdn.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
