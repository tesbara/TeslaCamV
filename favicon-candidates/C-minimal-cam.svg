<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- 案C: ミニマルカメラ + 録画ドット -->
  <!-- 洗練された丸型レンズ + 赤い録画ドット。ダッシュカムらしさを残しつつモダン -->
  <defs>
    <radialGradient id="lensC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
  </defs>
  <!-- 背景 -->
  <circle cx="24" cy="24" r="22" fill="url(#lensC)"/>
  <!-- レンズ反射リング -->
  <circle cx="24" cy="24" r="15" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="24" cy="24" r="10" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
  <!-- レンズ中心 -->
  <circle cx="24" cy="24" r="5" fill="#3b82f6"/>
  <circle cx="24" cy="24" r="2" fill="#93c5fd"/>
  <!-- 録画インジケーター (右上) -->
  <circle cx="36" cy="12" r="3.5" fill="#ef4444"/>
  <circle cx="36" cy="12" r="1.5" fill="#fca5a5" opacity="0.8"/>
</svg>
