  <defs>
    <radialGradient id="bgJ" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#2a0a0a"/>
      <stop offset="100%" stop-color="#0d0000"/>
    </radialGradient>
  </defs>
  <!-- 丸背景 -->
  <circle cx="24" cy="24" r="22" fill="url(#bgJ)"/>
  <!-- テスラ T マーク (上部) -->
  <path d="M24 6 C20 6 14 8 12 10 L16 12 C18 11 21 10.5 24 10.5 C27 10.5 30 11 32 12 L36 10 C34 8 28 6 24 6 Z"
        fill="#e64040" opacity="0.9"/>
  <path d="M24 10 L22 12 L24 38 L26 12 Z" fill="#e64040" opacity="0.9"/>
  <!-- カメラレンズ (下寄り) -->
  <circle cx="24" cy="28" r="8" fill="#0d0000" stroke="#cc0000" stroke-width="1.5"/>
  <circle cx="24" cy="28" r="4" fill="#cc0000"/>
  <circle cx="24" cy="28" r="1.5" fill="#f08080"/>
  <!-- 録画インジケーター -->
