<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- 案E: 6カメラグリッド -->
  <!-- 6カメラ同時表示をモチーフ。TeslaCamV の特徴を象徴するデザイン -->
  <defs>
    <linearGradient id="bgE" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <!-- 角丸背景 -->
  <rect x="2" y="2" width="44" height="44" rx="10" fill="url(#bgE)"/>
  <!-- 3x2 グリッド (カメラパネル) -->
  <!-- 上段 -->
  <rect x="6"  y="7"  width="11" height="15" rx="2" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
  <rect x="19" y="7"  width="11" height="15" rx="2" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
  <rect x="32" y="7"  width="11" height="15" rx="2" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.2"/>
  <!-- 下段 -->
  <rect x="6"  y="26" width="11" height="15" rx="2" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
  <rect x="19" y="26" width="11" height="15" rx="2" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
  <rect x="32" y="26" width="11" height="15" rx="2" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
  <!-- アクティブパネルの再生アイコン (右上パネル) -->
  <polygon points="35.5,12 40.5,14.5 35.5,17" fill="#60a5fa"/>
</svg>
