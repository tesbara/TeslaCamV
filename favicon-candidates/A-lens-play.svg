<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- 案A: レンズ + 再生ボタン -->
  <!-- カメラレンズの中に再生三角を配置。動画ビューワーであることが直感的 -->
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="ringA" x1="10" y1="10" x2="38" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- 丸い背景 -->
  <circle cx="24" cy="24" r="22" fill="url(#bgA)"/>
  <!-- レンズ外輪 -->
  <circle cx="24" cy="24" r="17" fill="none" stroke="url(#ringA)" stroke-width="2.5"/>
  <!-- レンズ内輪 -->
  <circle cx="24" cy="24" r="12" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.4"/>
  <!-- 再生ボタン -->
  <polygon points="20,16 34,24 20,32" fill="#60a5fa"/>
</svg>
