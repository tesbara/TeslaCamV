    <!-- T の本体 (縦棒 + 横棒下端) -->
    <path d="M500 250 C500 250 595 134 595 134 C595 134 759 137 922 213 C880 275 798 306 798 306 C792 251 753 237 630 237 C630 237 500 966 500 966 C500 966 369 237 369 237 C247 237 208 251 202 306 C202 306 119 275 78 213 C241 137 404 134 404 134 C404 134 500 250 500 250Z"/>
  </g>
  <!-- 録画インジケーター -->
  <circle cx="38" cy="18" r="2.5" fill="#ff3333"/>
</svg>
