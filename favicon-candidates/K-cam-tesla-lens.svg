<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- 案K: 現在のダッシュカムデザイン (赤基調) + レンズ内に正確なテスラロゴ -->
  <!-- ダッシュカム筐体 -->
  <rect x="4" y="12" width="40" height="24" rx="4" fill="#1a0505" stroke="#cc0000" stroke-width="2"/>
  <!-- レンズ外輪 -->
  <circle cx="24" cy="24" r="8" fill="#0d0000" stroke="#e64040" stroke-width="1.5"/>
  <!-- テスラロゴ (公式形状を縮小配置) -->
