<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- 案I: CC0000 レッド基調の丸型レンズ -->
  <!-- モダンな丸型にレッドカラーパレット -->
  <defs>
    <radialGradient id="lensI" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a0a0a"/>
      <stop offset="100%" stop-color="#0d0000"/>
    </radialGradient>
    <linearGradient id="ringI" x1="10" y1="10" x2="38" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e64040"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
  </defs>
  <!-- 丸背景 -->
  <circle cx="24" cy="24" r="22" fill="url(#lensI)"/>
  <!-- レンズリング -->
  <circle cx="24" cy="24" r="15" fill="none" stroke="url(#ringI)" stroke-width="2"/>
  <circle cx="24" cy="24" r="10" fill="none" stroke="#e64040" stroke-width="0.8" opacity="0.3"/>
  <!-- レンズ中心 -->
  <circle cx="24" cy="24" r="5" fill="#cc0000"/>
  <circle cx="24" cy="24" r="2" fill="#f08080"/>
  <!-- 録画インジケーター (白に変更して赤背景で映えるように) -->
  <circle cx="36" cy="12" r="3" fill="white" opacity="0.9"/>
  <circle cx="36" cy="12" r="1.5" fill="white"/>
</svg>
